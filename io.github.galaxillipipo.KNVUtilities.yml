app-id: io.github.galaxillipipo.KNVUtilities
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
command: KNVUtilities
finish-args:
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=ipc

modules:
  - name: knvutilities
    buildsystem: simple
    build-commands:
      - install -D KNVUtilities /app/bin/KNVUtilities
      - install -D KNVUtilities.desktop /app/share/applications/io.github.galaxillipipo.KNVUtilities.desktop
      - install -D KNVUtilities.png /app/share/icons/hicolor/128x128/apps/io.github.galaxillipipo.KNVUtilities.png
      - install -D io.github.galaxillipipo.KNVUtilities.metainfo.xml /app/share/metainfo/io.github.galaxillipipo.KNVUtilities.metainfo.xml
    sources:
      - type: archive
        url: https://github.com/GalaxilliPipo/KNVUtilities/releases/download/TARGZ/KNVUtilities-1.0.0.tar.gz
        sha256: c7431b955c898cdb7a573638c6f933e115a8743f85da8624fa28cca63e31607f
